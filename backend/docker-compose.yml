services:
  postgres:
    image: postgres:16
    container_name: observability-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: observability

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: observability-redis

    ports:
      - "6379:6379"

  api:
    build:
      context: .

    container_name: observability-api

    depends_on:
      - postgres
      - redis

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/observability

      REDIS_HOST: redis

      REDIS_PORT: 6379

      PORT: 3001

    ports:
      - "3001:3001"

volumes:
  postgres_data: